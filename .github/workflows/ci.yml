name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking while legacy type errors are cleaned up. Remove
      # continue-on-error once `bunx tsc --noEmit` returns green locally.
      - name: Type check
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -x dist/grouter
          ./dist/grouter --version
